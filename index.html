<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍴 배정고 급식 & 한줄평</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary-color: #4CAF50; --secondary-color: #FF9800; --bg-color: #f4f7f6; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { background: white; width: 95%; max-width: 420px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h1 { font-size: 1.5rem; color: #333; margin-bottom: 5px; }
        .school-name { font-size: 0.9rem; color: #666; margin-bottom: 20px; }
        input[type="date"] { padding: 12px; border-radius: 12px; border: 1px solid #ddd; width: 85%; margin-bottom: 20px; font-size: 1rem; outline: none; cursor: pointer; }
        
        .tab-group { display: flex; background: #eee; border-radius: 12px; margin-bottom: 20px; padding: 5px; }
        .tab { flex: 1; padding: 12px; cursor: pointer; border-radius: 8px; font-weight: bold; color: #777; transition: 0.3s; }
        .tab.active.lunch { background: var(--primary-color); color: white; }
        .tab.active.dinner { background: var(--secondary-color); color: white; }

        .meal-card { background: #fff; padding: 25px; border-radius: 15px; border: 2px solid #eee; margin-bottom: 20px; min-height: 160px; position: relative; display: flex; flex-direction: column; justify-content: center; transition: 0.3s; }
        .meal-card.lunch { border-color: var(--primary-color); background: #f1f8e9; }
        .meal-card.dinner { border-color: var(--secondary-color); background: #fff3e0; }
        .meal-title { font-weight: bold; font-size: 1.2rem; margin-bottom: 15px; }
        .lunch .meal-title { color: var(--primary-color); }
        .dinner .meal-title { color: var(--secondary-color); }
        .menu-list { line-height: 1.8; color: #444; font-size: 1.1rem; word-break: keep-all; }

        /* ✨ 특식 반짝이 효과 */
        @keyframes sparkle-glow { 0%, 100% { box-shadow: 0 0 5px rgba(255,152,0,0.4); border-color: #ff9800; } 50% { box-shadow: 0 0 20px rgba(255,152,0,0.8); border-color: #ffeb3b; } }
        .special-meal-card { animation: sparkle-glow 1.5s infinite; border-width: 3px !important; background-color: #fffde7 !important; }

        /* 💬 댓글 섹션 */
        .comment-section { text-align: left; margin-top: 25px; border-top: 1px solid #eee; padding-top: 25px; }
        .comment-form { display: flex; gap: 8px; margin-bottom: 20px; }
        .comment-form input { padding: 12px; border-radius: 10px; border: 1px solid #ddd; flex: 1; outline: none; }
        .comment-form button { background: #333; color: white; border: none; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .comment-list { max-height: 300px; overflow-y: auto; }
        .comment-item { background: #f9f9f9; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 0.95rem; border: 1px solid #f0f0f0; }
        .comment-date { font-size: 0.75rem; color: #aaa; display: block; margin-top: 6px; }
        
        footer { margin-top: 25px; font-size: 0.8rem; color: #bbb; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍱 배정고 급식 가이드</h1>
        <div class="school-name">김현정 선생님이 만든 실시간 급식게시판</div>

        <input type="date" id="date-selector" onchange="updateUI()">

        <div class="tab-group">
            <div id="tab-lunch" class="tab active lunch" onclick="changeMealType('lunch')">☀️ 점심</div>
            <div id="tab-dinner" class="tab dinner" onclick="changeMealType('dinner')">🌙 저녁</div>
        </div>

        <div id="meal-card" class="meal-card">
            <div class="meal-title" id="meal-status">오늘의 메뉴</div>
            <div class="menu-list" id="menu-content">메뉴를 불러오는 중...</div>
        </div>

        <div class="comment-section">
            <h3>💬 한줄평 남기기</h3>
            <div class="comment-form">
                <input type="text" id="comment-input" placeholder="오늘 급식 어때요?">
                <button onclick="saveComment()">등록</button>
            </div>
            <div id="comment-list" class="comment-list"></div>
        </div>

        <footer>1학년 학생들을 응원합니다 ❤️</footer>
    </div>

    <script>
        // 1. 파이어베이스 설정 (선생님 키값 적용 완료)
        const firebaseConfig = {
            apiKey: "AIzaSyBuUIzRhnj2lohiMZiXWmIosJDluEqp0-o",
            authDomain: "baejeong-lunch.firebaseapp.com",
            databaseURL: "https://baejeong-lunch-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "baejeong-lunch",
            storageBucket: "baejeong-lunch.firebasestorage.app",
            messagingSenderId: "297041913628",
            appId: "1:297041913628:web:dca35b9917a5c2888ffcd9"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 2. 급식 데이터
        const lunchData = {"2026-03-23": "한우불고기덮밥, 유부콩나물국, 건새우마늘쫑볶음, 양념어묵꼬치, 배추김치, 치즈타르트", "2026-03-24": "칼슘밥, 자장소스, 계란후라이, 배추김치, 유기농주스", "2026-03-25": "현미밥, 만두국, 치즈닭구이, 감자전, 취나물무침, 배추김치", "2026-03-26": "칼슘밥, 나주곰탕, 김치오징어전, 찰도그, 깍두기, 바나나", "2026-03-27": "혼합잡곡밥, 동태국, 콩나물잡채, 동그랑땡계란부침, 햄감자조림, 배추김치", "2026-03-30": "마파두부덮밥, 봄동된장국, 탕수육, 돌나물, 새우치즈구이, 배추김치", "2026-03-31": "현미밥, 호박수제비국, 고구마함박스테이크, 계란장조림, 콥샐러드", "2026-04-01": "백미밥, 북어채콩나물국, 궁중갈비찜, 브로콜리두부무침, 생크림딸기오믈렛", "2026-04-02": "혼합잡곡밥, 청국장찌개, 오징어주꾸미볶음, 순두부계란찜, 미니돈까스, 사과치커리초무침", "2026-04-06": "현미밥, 쇠고기미역국, 대패오리불고기, 두부구이, 김말이튀김, 취나물무침", "2026-04-07": "칼슘밥, 우거지등뼈감자탕, 계란말이, 고등어구이, 콩나물무침, 배추김치", "2026-04-08": "곤드레밥, 두부호박된장국, 오향장육, 무쌈, 고구마롤, 배추김치, 호두정과", "2026-04-09": "흑미밥, 어묵국, 메추리알쇠고기볶음, 소시지계란부침, 마늘쫑멸치볶음", "2026-04-10": "칼슘밥, 계란찜, 탕평채, 배추김치, 파인애플", "2026-04-13": "국수, 백미밥/김가루, 떡갈비, 미나리오징어무침, 배추김치, 슈크림붕어빵", "2026-04-14": "혼합잡곡밥, 단배추된장국, 감자채피망볶음, 배추김치", "2026-04-15": "칼슘밥, 마라탕, 꿔바로우, 스크램블에그, 배추김치, 맛김", "2026-04-16": "된장찌개, 오꼬노미볶음우동, 감자조림, 온두부/김치볶음, 토마토꿀절임", "2026-04-17": "카레, 불닭볶음/또띠아, 양상추샐러드, 맛김치, 비요뜨", "2026-04-20": "현미밥, 곤약탕국, 간장불고기, 참치두부조림, 우엉잡채, 배추김치", "2026-04-21": "칼슘밥, 부대찌개, 계란장조림, 열무된장무침, 가자미버터구이, 깍두기", "2026-04-22": "현미밥, 두부호박된장국, 간장찜닭, 동그랑땡계란부침, 건새우마늘쫑볶음", "2026-04-23": "혼합잡곡밥, 쇠고기무국, 순살족발/무쌈, 버섯계란찜, 숙주미나리무침, 배추김치", "2026-04-24": "나물비빔밥, 청국장찌개, 계란후라이, 배추김치, 애플파이", "2026-04-27": "컵밥, 북어채무국, 초코꽈배기", "2026-04-28": "우동, 비빔만두강정, 배추김치", "2026-04-29": "감자튀김, 흑당버블티", "2026-04-30": "채소볶음밥, 유부장국, 떡볶이, 깍두기, 유산균음료"};
        const dinnerData = {"2026-03-23": "우동, 치즈반달돈까스, 브로콜리/초장, 깍두기, 딸기", "2026-03-25": "오징어주꾸미비빔밥, 단배추된장국, 계란찜, 떡갈비떡꼬치", "2026-03-26": "칼슘밥/김자반, 우대갈비구이, 국물떡볶이, 양상추샐러드, 아이스크림", "2026-03-27": "칼슘밥, 나가사끼짬뽕국, 곤약메추리알조림, 배추김치", "2026-03-30": "혼합잡곡밥, 부대찌개, 삼치구이, 고추튀김, 깍두기, 베이비슈", "2026-03-31": "지코바치밥, 단배추된장국, 크림떡볶음, 명엽채조림, 배추김치", "2026-04-01": "차수수밥, 떡국, 깐쇼새우조림, 호박베이컨볶음, 참나물전, 배추김치", "2026-04-02": "라면, 모듬튀김, 순대/쌈장, 구슬아이스크림", "2026-04-06": "김치말이국수, 백미밥, 도끼떡갈비, 시금치나물, 갈릭파이", "2026-04-07": "나시고랭볶음밥, 시금치된장국, 불고기분짜, 춘권, 깍두기", "2026-04-08": "칼슘밥, 닭곰탕, 스팸구이, 쥐포채조림, 깍두기, 요구르트", "2026-04-09": "통닭구이, 양배추마요케첩무침, 무절임, 자몽에이드", "2026-04-10": "현미밥, 들깨가루무채국, 칼비빔면, 함박스테이크, 깍두기, 요거트", "2026-04-13": "기장밥, 쇠고기버섯전골, 생선까스, 도토리묵, 배추김치", "2026-04-14": "추억의도시락, 유부장국, 연근조림, 소떡소떡, 깍두기, 쿨피스", "2026-04-15": "혼합잡곡밥, 고추장찌개, 오리훈제, 콩나물무침, 해물파전, 배추김치", "2026-04-16": "칼슘밥, 삼겹살구이, 물쫄면, 상추/쌈장, 후룻볼", "2026-04-17": "혼합잡곡밥, 육개장, 연어스테이크, 계란말이, 김치오징어전, 바스크초코케익", "2026-04-20": "치킨마요덮밥, 팽이버섯된장국, 일미도라지무침, 배추김치, 회오리감자, 딸기주스", "2026-04-21": "돈코츠라면, 백미밥, 치킨스테이크, 깍두기, 바나나우유", "2026-04-22": "고추장불고기덮밥, 유부콩나물국, 감자크로켓, 연두부, 배추김치, 푸딩", "2026-04-23": "시카고피자, 알리오올리오스파게티, 양상추샐러드, 모듬피클, 사과주스", "2026-04-24": "율무밥, 들깨가루시락국, 불막창닭어깨살볶음, 생선까스, 오이참나물겉절이, 배추김치"};

        const specialDinnerDates = ["2026-03-26", "2026-04-02", "2026-04-16", "2026-04-23"];
        let currentType = 'lunch';
        const dateInput = document.getElementById('date-selector');
        dateInput.value = new Date().toISOString().split('T')[0];

        function updateUI() {
            const date = dateInput.value;
            const menu = currentType === 'lunch' ? lunchData[date] : dinnerData[date];
            const card = document.getElementById('meal-card');
            
            card.className = `meal-card ${currentType}`;
            document.getElementById('meal-status').innerText = `${currentType === 'lunch' ? '점심' : '저녁'} 메뉴`;

            if (currentType === 'dinner' && specialDinnerDates.includes(date)) {
                card.classList.add('special-meal-card');
                document.getElementById('meal-status').innerText = "✨밥심 충전 특식!✨";
            }

            document.getElementById('menu-content').innerHTML = menu ? menu.split(', ').join('<br>') : "정보가 없습니다.";
            loadComments();
        }

        function saveComment() {
            const date = dateInput.value;
            const input = document.getElementById('comment-input');
            if (!input.value) return;

            database.ref(`meals/${date}/${currentType}`).push({
                text: input.value,
                timestamp: new Date().toLocaleString()
            });
            input.value = "";
        }

        function loadComments() {
            const date = dateInput.value;
            const commentList = document.getElementById('comment-list');
            database.ref(`meals/${date}/${currentType}`).off();
            commentList.innerHTML = "댓글 로딩 중...";

            database.ref(`meals/${date}/${currentType}`).on('value', (snapshot) => {
                commentList.innerHTML = "";
                const data = snapshot.val();
                if (data) {
                    Object.values(data).reverse().forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'comment-item';
                        div.innerHTML = `${item.text} <span class="comment-date">${item.timestamp}</span>`;
                        commentList.appendChild(div);
                    });
                } else {
                    commentList.innerHTML = "<p style='color:#ccc; text-align:center;'>첫 번째 한줄평을 남겨주세요!</p>";
                }
            });
        }

        function changeMealType(type) {
            currentType = type;
            document.getElementById('tab-lunch').classList.toggle('active', type === 'lunch');
            document.getElementById('tab-dinner').classList.toggle('active', type === 'dinner');
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
