<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍴 배정고 급식 & 소통창</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary-color: #66bb6a; --secondary-color: #ffa726; --bg-color: #fdfcf0; --card-bg: #ffffff; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { background: var(--card-bg); width: 95%; max-width: 400px; padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; border: 4px solid #fff; }
        h1 { font-size: 1.6rem; color: #444; margin-bottom: 5px; }
        .school-name { font-size: 0.85rem; color: #aaa; margin-bottom: 25px; letter-spacing: 1px; }

        /* 📅 둥글둥글 귀여운 날짜 선택창 */
        .date-container { margin-bottom: 25px; }
        input[type="date"] {
            border: 3px solid #eee; border-radius: 50px; padding: 10px 20px; font-size: 1rem; font-weight: bold; color: #555; outline: none; transition: 0.3s; background: #fafafa; cursor: pointer; font-family: inherit;
        }
        input[type="date"]:focus { border-color: var(--secondary-color); background: #fff; }

        .tab-group { display: flex; background: #f0f0f0; border-radius: 20px; margin-bottom: 25px; padding: 6px; }
        .tab { flex: 1; padding: 12px; cursor: pointer; border-radius: 15px; font-weight: bold; color: #999; transition: 0.3s; }
        .tab.active.lunch { background: var(--primary-color); color: white; }
        .tab.active.dinner { background: var(--secondary-color); color: white; }

        .meal-card { background: #fff; padding: 30px; border-radius: 25px; border: 2px solid #f0f0f0; margin-bottom: 25px; min-height: 160px; position: relative; transition: 0.3s; }
        .meal-card.lunch { border-color: #e8f5e9; background: #f9fff9; }
        .meal-card.dinner { border-color: #fff3e0; background: #fffdf9; }
        .meal-title { font-weight: bold; font-size: 1.3rem; margin-bottom: 15px; color: #555; }
        .menu-list { line-height: 2; color: #666; font-size: 1.05rem; word-break: keep-all; }

        /* ✨ 특식 반짝반짝 효과 */
        @keyframes rainbow-glow { 0% { box-shadow: 0 0 5px #ffd54f; border-color: #ffd54f; } 50% { box-shadow: 0 0 20px #ffb300; border-color: #ffb300; } 100% { box-shadow: 0 0 5px #ffd54f; border-color: #ffd54f; } }
        .special-meal-card { animation: rainbow-glow 1.5s infinite; border-width: 4px !important; }

        /* 💬 댓글창 디자인 */
        .comment-section { text-align: left; margin-top: 20px; border-top: 2px dashed #eee; padding-top: 25px; }
        .comment-form { display: flex; gap: 8px; margin-bottom: 20px; }
        .comment-form input { flex: 1; padding: 12px 18px; border-radius: 50px; border: 2px solid #eee; outline: none; font-size: 0.9rem; background: #fafafa; }
        .comment-form button { background: #555; color: white; border: none; padding: 10px 18px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .comment-form button:hover { background: #000; }
        .comment-item { background: #f8f9fa; padding: 15px; border-radius: 18px; margin-bottom: 12px; position: relative; border: 1px solid #f1f1f1; }
        .comment-text { font-size: 0.95rem; color: #444; line-height: 1.4; margin-right: 35px; }
        .comment-date { font-size: 0.7rem; color: #ccc; margin-top: 8px; display: block; }
        .delete-btn { position: absolute; top: 12px; right: 12px; border: none; background: none; color: #ddd; cursor: pointer; font-size: 0.75rem; }
        .delete-btn:hover { color: #ff8a80; }

        footer { margin-top: 30px; font-size: 0.75rem; color: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍱 배정 급식 포털</h1>
        <div class="school-name">KIM HYEON JEOUNG PRINTS</div>

        <div class="date-container">
            <input type="date" id="date-selector" onchange="updateUI()">
        </div>

        <div class="tab-group">
            <div id="tab-lunch" class="tab active lunch" onclick="changeMealType('lunch')">☀️ 점심</div>
            <div id="tab-dinner" class="tab dinner" onclick="changeMealType('dinner')">🌙 저녁</div>
        </div>

        <div id="meal-card" class="meal-card">
            <div class="meal-title" id="meal-status">오늘의 메뉴</div>
            <div class="menu-list" id="menu-content">로딩 중...</div>
        </div>

        <div class="comment-section">
            <h3 style="font-size:1rem; color:#666; margin-left:10px;">💬 실시간 한줄평</h3>
            <div class="comment-form">
                <input type="text" id="comment-input" placeholder="오늘 급식 어때요?">
                <button onclick="saveComment()">등록</button>
            </div>
            <div id="comment-list" style="max-height: 300px; overflow-y: auto;"></div>
        </div>

        <footer>1학년 학생들을 응원합니다 ❤️</footer>
    </div>

    <script>
        const ADMIN_PASSWORD = "배정고1234";

        // 💡 선생님의 미국 서버 주소를 직접 반영했습니다!
        const firebaseConfig = {
            apiKey: "AIzaSyBuUIzRhnj2lohiMZiXWmIosJDluEqp0-o",
            authDomain: "baejeong-lunch.firebaseapp.com",
            databaseURL: "https://baejeong-lunch-default-rtdb.firebaseio.com", 
            projectId: "baejeong-lunch",
            storageBucket: "baejeong-lunch.firebasestorage.app",
            messagingSenderId: "297041913628",
            appId: "1:297041913628:web:dca35b9917a5c2888ffcd9"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const lunchData = {"2026-03-23": "한우불고기덮밥, 유부콩나물국, 건새우마늘쫑볶음, 양념 어묵 꼬치, 배추김치, 치즈 타르트", "2026-03-24": "칼슘밥, 자장 소스, 계란 후라이, 배추김치, 유기농 주스", "2026-03-25": "현미밥, 만두국, 치즈 닭구이, 감자전, 취나물 무침, 배추김치", "2026-03-26": "칼슘밥, 나주곰탕, 김치 오징어 전, 찰도그, 깍두기, 바나나", "2026-03-27": "혼합잡곡밥, 동태국, 콩나물 잡채, 동그랑땡 계란 부침, 햄 감자 조림, 배추김치", "2026-03-30": "마파두부 덮밥, 봄동 된장국, 탕수육, 돌나물, 새우 치즈 구이, 배추김치", "2026-03-31": "현미밥, 호박 수제비국, 고구마 함박 스테이크, 계란 장조림, 콥 샐러드", "2026-04-01": "백미밥, 북어채 콩나물국, 궁중 갈비찜, 브로콜리 두부 무침, 생크림 딸기 오믈렛", "2026-04-02": "혼합잡곡밥, 청국장찌개, 오징어 주꾸미 볶음, 순두부 계란찜, 미니 돈가스, 사과 치커리 초무침", "2026-04-06": "현미밥, 쇠고기 미역국, 대패 오리 불고기, 두부 구이, 김말이 튀김, 취나물 무침", "2026-04-07": "칼슘밥, 우거지 등뼈 감자탕, 계란말이, 고등어구이, 콩나물 무침, 배추김치", "2026-04-08": "곤드레밥, 두부 호박 된장국, 오향장육, 무쌈, 고구마 롤, 배추김치, 호두 정과", "2026-04-09": "흑미밥, 어묵국, 메추리알 쇠고기 볶음, 소시지 계란 부침, 마늘쫑 멸치 볶음", "2026-04-10": "칼슘밥, 계란찜, 탕평채, 배추김치, 파인애플", "2026-04-13": "국수, 백미밥/김가루, 떡갈비, 미나리 오징어 무침, 배추김치, 슈크림 붕어빵", "2026-04-14": "혼합잡곡밥, 단배추 된장국, 감자채 피망 볶음, 배추김치", "2026-04-15": "칼슘밥, 마라탕, 꿔바로우, 스크램블 에그, 배추김치, 맛김", "2026-04-16": "된장찌개, 오꼬노미 볶음 우동, 감자 조림, 온두부/김치 볶음, 토마토 꿀 절임", "2026-04-17": "카레, 불닭 볶음/또띠아, 양상추 샐러드, 맛김치, 비요뜨", "2026-04-20": "현미밥, 곤약 탕국, 간장 불고기, 참치 두부 조림, 우엉 잡채, 배추김치", "2026-04-21": "칼슘밥, 부대찌개, 계란 장조림, 열무 된장 무침, 가자미 버터구이, 깍두기", "2026-04-22": "현미밥, 두부 호박 된장국, 간장 찜닭, 동그랑땡 계란 부침, 건새우 마늘쫑 볶음", "2026-04-23": "혼합잡곡밥, 쇠고기 무국, 순살 족발/무쌈, 버섯 계란찜, 숙주 미나리 무침, 배추김치", "2026-04-24": "나물 비빔밥, 청국장찌개, 계란후라이, 배추김치, 애플파이", "2026-04-27": "컵밥, 북어채 무국, 초코 꽈배기", "2026-04-28": "우동, 비빔만두 강정, 배추김치", "2026-04-29": "감자튀김, 흑당 버블티", "2026-04-30": "채소 볶음밥, 유부 장국, 떡볶이, 깍두기, 유산균 음료"};
        const dinnerData = {"2026-03-23": "우동, 치즈 반달 돈가스, 브로콜리/초장, 깍두기, 딸기", "2026-03-25": "오징어 주꾸미 비빔밥, 단배추 된장국, 계란찜, 떡갈비 떡꼬치", "2026-03-26": "칼슘밥/김자반, 우대 갈비 구이, 국물 떡볶이, 양상추 샐러드, 아이스크림", "2026-03-27": "칼슘밥, 나가사끼 짬뽕국, 곤약 메추리알 조림, 배추김치", "2026-03-30": "혼합잡곡밥, 부대찌개, 삼치구이, 고추 튀김, 깍두기, 베이비슈", "2026-03-31": "지코바 치밥, 단배추 된장국, 크림 떡볶음, 명엽채 조림, 배추김치", "2026-04-01": "차수수밥, 떡국, 깐쇼새우 조림, 호박 베이컨 볶음, 참나물 전, 배추김치", "2026-04-02": "라면, 모듬 튀김, 순대/쌈장, 구슬 아이스크림", "2026-04-06": "김치말이 국수, 백미밥, 도끼 떡갈비, 시금치 나물, 갈릭 파이", "2026-04-07": "나시고랭 볶음밥, 시금치 된장국, 불고기 분짜, 춘권, 깍두기", "2026-04-08": "칼슘밥, 닭곰탕/당면 사리, 스팸구이, 쥐포채 조림, 깍두기, 요구르트", "2026-04-09": "통닭구이, 양배추 마요 케첩 무침, 무절임, 자몽 에이드", "2026-04-10": "현미밥, 들깨가루 무채국, 칼 비빔면, 함박 스테이크, 깍두기, 요거트/블루베리", "2026-04-13": "기장밥, 쇠고기 버섯 전골, 생선까스, 도토리묵, 배추김치", "2026-04-14": "추억의 도시락, 유부 장국, 연근 조림, 소떡소떡, 깍두기, 쿨피스", "2026-04-15": "혼합잡곡밥, 고추장찌개, 오리훈제, 콩나물 무침, 해물파전, 배추김치", "2026-04-16": "칼슘밥/ 맛김치, 삼겹살 구이, 물쫄면, 상추/쌈장, 후룻볼", "2026-04-17": "혼합잡곡밥, 육개장, 연어 스테이크, 계란말이, 김치 오징어 전, 바스크 초코 케익", "2026-04-20": "치킨마요 덮밥, 팽이버섯 된장국, 일미 도라지 무침, 배추김치, 회오리감자, 딸기 주스", "2026-04-21": "돈코츠 라면, 백미밥, 치킨 스테이크, 깍두기, 바나나우유", "2026-04-22": "고추장 불고기 덮밥, 유부 콩나물국, 감자 크로켓, 연두부/쪽파 양념장, 배추김치, 푸딩", "2026-04-23": "갈릭 크림 시카고 피자, 알리오 올리오 스파게티, 양상추 샐러드, 모듬 피클, 사과 주스", "2026-04-24": "율무밥, 들깨가루 시락국, 불막창 닭 어깨살 볶음, 생선까스, 오이 참나물 겉절이, 배추김치"};

        const specialDinnerDates = ["2026-03-26", "2026-04-02", "2026-04-16", "2026-04-23"];
        let currentType = 'lunch';
        const dateInput = document.getElementById('date-selector');
        dateInput.value = new Date().toISOString().split('T')[0];

        function updateUI() {
            const date = dateInput.value;
            const menu = currentType === 'lunch' ? lunchData[date] : dinnerData[date];
            const card = document.getElementById('meal-card');
            card.className = `meal-card ${currentType}`;
            document.getElementById('meal-status').innerText = `${currentType === 'lunch' ? '오늘의 점심' : '오늘의 저녁'}`;

            if (currentType === 'dinner' && specialDinnerDates.includes(date)) {
                card.classList.add('special-meal-card');
                document.getElementById('meal-status').innerText = "✨밥심 충전 특식!✨";
            }

            document.getElementById('menu-content').innerHTML = menu ? menu.split(', ').join('<br>') : "정보가 없습니다. 😴";
            loadComments();
        }

        function saveComment() {
            const date = dateInput.value;
            const input = document.getElementById('comment-input');
            if (!input.value.trim()) return;
            database.ref(`meals/${date}/${currentType}`).push({
                text: input.value,
                timestamp: new Date().toLocaleString()
            });
            input.value = "";
        }

        function deleteComment(key) {
            const password = prompt("비밀번호를 입력하세요:");
            if (password === ADMIN_PASSWORD) {
                const date = dateInput.value;
                database.ref(`meals/${date}/${currentType}/${key}`).remove();
            } else if (password !== null) alert("틀렸습니다!");
        }

        function loadComments() {
            const date = dateInput.value;
            const commentList = document.getElementById('comment-list');
            database.ref(`meals/${date}/${currentType}`).off();
            database.ref(`meals/${date}/${currentType}`).on('value', (snapshot) => {
                commentList.innerHTML = "";
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).reverse().forEach(key => {
                        const item = data[key];
                        const div = document.createElement('div');
                        div.className = 'comment-item';
                        div.innerHTML = `<div class="comment-text">${item.text}</div><button class="delete-btn" onclick="deleteComment('${key}')">x</button><span class="comment-date">${item.timestamp}</span>`;
                        commentList.appendChild(div);
                    });
                } else {
                    commentList.innerHTML = "<p style='color:#ccc; text-align:center; font-size:0.8rem; margin-top:20px;'>첫 번째 한줄평을 남겨주세요! 😊</p>";
                }
            });
        }

        function changeMealType(type) {
            currentType = type;
            document.getElementById('tab-lunch').classList.toggle('active', type === 'lunch');
            document.getElementById('tab-dinner').classList.toggle('active', type === 'dinner');
            updateUI();
        }
        updateUI();
    </script>
</body>
</html>
