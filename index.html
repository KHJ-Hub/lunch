            color: #999; display: flex; align-items: center; justify-content: center;
            transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05);

        .date-nav-btn:hover { background: #f0f0f0; color: var(--secondary); border-color: var(--secondary); }

        input[type="date"] {
            border: 2px solid #EEE; border-radius: 50px; padding: 10px 20px;
            font-size: 0.95rem; font-weight: 700; color: #555; outline: none;
            background: #FDFDFD; cursor: pointer; font-family: inherit; width: 65%; transition: 0.3s;
            text-align: center;
        }

        .tab-switch { display: flex; background: #EEE; border-radius: 20px; padding: 5px; margin-bottom: 20px; gap: 3px; }

        .tab-item.active.dinner { background: var(--secondary); color: white; }

        .meal-status-label { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; }
        .lunch .meal-status-label { background: var(--primary); color: white; }
        .dinner .meal-status-label { background: var(--secondary); color: white; }

            </div>

                </div>

        const specialDinnerDates = ["2026-03-26", "2026-04-02", "2026-04-16", "2026-04-23"];
        let currentTab = 'lunch';
        const dateInput = document.getElementById('date-selector');

        function setToday() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            dateInput.value = `${year}-${month}-${day}`;
        }

        // ◀ ▶ 버튼으로 날짜 변경하는 함수 추가
        function changeDate(offset) {
            const currentDate = new Date(dateInput.value);
            currentDate.setDate(currentDate.getDate() + offset);
            const y = currentDate.getFullYear();
            const m = String(currentDate.getMonth() + 1).padStart(2, '0');
            const d = String(currentDate.getDate()).padStart(2, '0');
            dateInput.value = `${y}-${m}-${d}`;
            updateUI();
        }

        function updateUI() {
            const date = dateInput.value;
            const card = document.getElementById('meal-card');
            const statusLabel = document.getElementById('meal-status');
            const suggestView = document.getElementById('suggestion-view-container');
            const mealView = document.getElementById('meal-view-container');
            
            if (currentTab === 'suggest') {
                mealView.style.display = 'none'; suggestView.style.display = 'block'; loadSuggestions();
            } else {
                mealView.style.display = 'block'; suggestView.style.display = 'none';
                const menu = (currentTab === 'lunch') ? lunchData[date] : dinnerData[date];
                statusLabel.innerText = `${currentTab === 'lunch' ? '오늘의 점심' : '오늘의 저녁'}`;
                card.className = `meal-content-area ${currentTab}`;

                if (currentTab === 'dinner' && specialDinnerDates.includes(date)) {
                    card.classList.add('special-meal-card');
                    statusLabel.innerText = "✨ 오 늘 의 특 식 ! ✨";
                } else { card.classList.remove('special-meal-card'); }

                document.getElementById('menu-content').innerHTML = menu ? menu.split(',').join('<br>') : "정보가 없습니다 😴";
                loadRating(); loadComments(); loadPollData();
            }
        }

        function submitRating(score) {
            const date = dateInput.value;
            if (localStorage.getItem(`voted_${date}_${currentTab}`)) return alert("오늘 별점은 이미 남기셨습니다! 😊");
            database.ref(`meals/${date}/${currentTab}/rating`).transaction((data) => {
                if (!data) return { totalScore: score, voterCount: 1, average: score.toFixed(1) };
                const newTotal = (data.totalScore || 0) + score;
                const newCount = (data.voterCount || 0) + 1;
                return { totalScore: newTotal, voterCount: newCount, average: (newTotal / newCount).toFixed(1) };
            }).then(() => { localStorage.setItem(`voted_${date}_${currentTab}`, true); alert("별점 감사합니다! ❤️"); });
        }

        function loadRating() {
            database.ref(`meals/${dateInput.value}/${currentTab}/rating`).on('value', (s) => {
                const d = s.val(); document.getElementById('avg-rating-display').innerHTML = `<span>★</span> ${d ? d.average : '0.0'}`;
            });
        }

        function saveComment() {
            const date = dateInput.value; const input = document.getElementById('comment-input');
            if (!input.value.trim()) return;
            database.ref(`meals/${date}/${currentTab}/comments`).push({ text: input.value, timestamp: new Date().toLocaleString(), likes: 0 });
            input.value = "";
        }

        function likeComment(key) {
            if (localStorage.getItem(`liked_${key}`)) return alert("이미 하트를 눌렀습니다! ❤️");
            database.ref(`meals/${dateInput.value}/${currentTab}/comments/${key}/likes`).transaction(l => (l || 0) + 1).then(() => localStorage.setItem(`liked_${key}`, true));
        }

        function loadComments() {
            const date = dateInput.value; const list = document.getElementById('comment-list');
            database.ref(`meals/${date}/${currentTab}/comments`).on('value', (s) => {
                list.innerHTML = ""; const data = s.val();
                if (data) Object.keys(data).reverse().forEach(k => {
                    const item = data[k]; const div = document.createElement('div');
                    div.className = 'comment-bubble';
                    div.innerHTML = `<div class="comment-text">${item.text}</div><div class="comment-meta"><span>${item.timestamp}</span><button class="like-badge" onclick="likeComment('${k}')">❤️ ${item.likes || 0}</button></div><button class="del-btn" onclick="deleteItem('comments', '${k}')">x</button>`;
                    list.appendChild(div);
                }); else list.innerHTML = "<p style='text-align:center; color:#BBB; font-size:0.8rem;'>첫 한줄평을 남겨주세요! 😊</p>";
            });
        }

        function loadPollData() {
            const box = document.getElementById('poll-box');
            const tomorrow = new Date(dateInput.value); tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = tomorrow.toISOString().split('T')[0];
            const menu = (currentTab === 'lunch') ? lunchData[tomorrowStr] : dinnerData[tomorrowStr];
            if (!menu) { box.style.display = 'none'; return; }
            const items = menu.split(','); const list = document.getElementById('poll-items-list');
            box.style.display = 'block';
            database.ref(`polls/${tomorrowStr}/${currentTab}`).on('value', (s) => {
                const votes = s.val() || {}; list.innerHTML = "";
                items.forEach((m, i) => {
                    const div = document.createElement('div'); div.className = 'poll-item-row';
                    div.onclick = () => submitVote(tomorrowStr, i, m);
                    div.innerHTML = `<span>${m}</span><b style="color:var(--info)">${votes[i] || 0}명</b>`;
                    list.appendChild(div);
                });
            });
        }

        function submitVote(date, idx, name) {
            if (localStorage.getItem(`poll_${date}_${currentTab}`)) return alert("내일 투표는 이미 하셨습니다! 😊");
            if (confirm(`"${name}"에 투표할까요?`)) {
                database.ref(`polls/${date}/${currentTab}/${idx}`).transaction(v => (v || 0) + 1).then(() => {
                    localStorage.setItem(`poll_${date}_${currentTab}`, true); alert("투표 완료! 🔥");
                });
            }
        }

        function saveSuggestion() {
            const input = document.getElementById('suggest-input'); if (!input.value.trim()) return;
            database.ref(`suggestions`).push({ text: input.value, timestamp: new Date().toLocaleString() });
            input.value = "";
        }

        function loadSuggestions() {
            const list = document.getElementById('suggest-list');
            database.ref(`suggestions`).on('value', (s) => {
                list.innerHTML = ""; const data = s.val();
                if (data) Object.keys(data).reverse().forEach(k => {
                    const item = data[k]; const div = document.createElement('div');
                    div.className = 'comment-bubble'; div.style.borderColor = "#D1E9FF";
                    div.innerHTML = `<div class="comment-text" style="color:var(--info)">💡 ${item.text}</div><span class="comment-meta">${item.timestamp}</span><button class="del-btn" onclick="deleteItem('suggestions', '${k}')">x</button>`;
                    list.appendChild(div);
                }); else list.innerHTML = "<p style='text-align:center; color:#BBB; font-size:0.8rem;'>건의사항을 남겨주세요! 😊</p>";
            });
        }

        function deleteItem(type, key) {
            if (prompt("관리자 비밀번호:") === ADMIN_PASSWORD) {
                if (type === 'comments') database.ref(`meals/${dateInput.value}/${currentTab}/comments/${key}`).remove();
                else database.ref(`suggestions/${key}`).remove();
            } else alert("틀렸습니다!");
        }

        function changeTab(tab) {
            currentTab = tab; document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active'); updateUI();
        }

        setToday();
        updateUI();
    </script>
