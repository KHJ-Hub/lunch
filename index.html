<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍱 배정고 급식 가이드</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --primary: #4CAF50; --primary-light: #E8F5E9;
            --secondary: #FF9800; --secondary-light: #FFF3E0;
            --bg: #F0F2F5; --card-white: #FFFFFF;
        }

        body {
            font-family: 'Pretendard', sans-serif; background-color: var(--bg);
            margin: 0; padding: 20px 0; display: flex; justify-content: center; min-height: 100vh;
        }

        .app-container {
            width: 100%; max-width: 400px; padding: 0 15px;
        }

        /* 🏠 메인 카드 디자인 */
        .main-card {
            background: var(--card-white); border-radius: 30px; 
            padding: 30px 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center; overflow: hidden;
        }

        .header h1 { font-size: 1.5rem; color: #333; margin: 0; font-weight: 800; }
        .header p { font-size: 0.85rem; color: #888; margin: 5px 0 25px; }

        /* 📅 날짜 선택기 스타일 */
        .date-box { margin-bottom: 25px; }
        input[type="date"] {
            border: 2px solid #EEE; border-radius: 15px; padding: 12px 20px;
            font-size: 1rem; font-weight: 700; color: #444; outline: none;
            background: #F9F9F9; cursor: pointer; font-family: inherit; width: 100%; box-sizing: border-box;
            transition: all 0.3s;
        }
        input[type="date"]:focus { border-color: var(--secondary); background: #FFF; box-shadow: 0 0 10px rgba(255,152,0,0.15); }

        /* ☀️🌙 탭 스위치 */
        .tab-switch {
            display: flex; background: #EEE; border-radius: 18px; padding: 5px; margin-bottom: 25px;
        }
        .tab-item {
            flex: 1; padding: 12px; cursor: pointer; border-radius: 14px;
            font-weight: 700; color: #888; transition: 0.3s; font-size: 0.95rem;
        }
        .tab-item.active.lunch { background: var(--primary); color: white; }
        .tab-item.active.dinner { background: var(--secondary); color: white; }

        /* 🍱 급식 메뉴 카드 */
        .meal-content-card {
            background: #FAFAFA; border-radius: 22px; padding: 25px;
            min-height: 140px; border: 1px solid #F0F0F0; transition: 0.3s;
        }
        .meal-content-card.lunch { background: var(--primary-light); border-color: #C8E6C9; }
        .meal-content-card.dinner { background: var(--secondary-light); border-color: #FFE0B2; }

        .meal-status-label {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 800; margin-bottom: 15px;
        }
        .lunch .meal-status-label { background: var(--primary); color: white; }
        .dinner .meal-status-label { background: var(--secondary); color: white; }

        .menu-text {
            line-height: 1.8; color: #444; font-size: 1.15rem; font-weight: 600; word-break: keep-all;
        }

        /* ✨ 특식 효과 */
        @keyframes pulse-special {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .special-meal {
            animation: pulse-special 2s infinite ease-in-out;
            border: 3px solid transparent;
            background-image: linear-gradient(#fffdf9, #fffdf9), linear-gradient(to right, #f83a3a, #f19e18, #66bb6a);
            background-origin: border-box; background-clip: content-box, border-box;
        }

        /* 💬 댓글 한줄평 섹션 */
        .comments-section { text-align: left; margin-top: 35px; }
        .comments-section h3 { font-size: 1.1rem; color: #333; margin-left: 5px; margin-bottom: 15px; }
        
        .comment-input-row { display: flex; gap: 8px; margin-bottom: 20px; }
        .comment-input-row input {
            flex: 1; padding: 12px 18px; border-radius: 15px; border: 2px solid #EEE;
            outline: none; font-size: 0.9rem; background: #F9F9F9;
        }
        .comment-input-row button {
            background: #333; color: white; border: none; padding: 0 18px;
            border-radius: 15px; cursor: pointer; font-weight: 700;
        }

        .comment-bubble {
            background: #FFF; padding: 15px; border-radius: 18px; margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03); border: 1px solid #F0F0F0; position: relative;
        }
        .comment-text { font-size: 0.95rem; color: #444; line-height: 1.5; font-weight: 500; }
        .comment-info { font-size: 0.7rem; color: #BBB; margin-top: 8px; display: block; }
        .del-btn { position: absolute; top: 10px; right: 10px; color: #DDD; cursor: pointer; border: none; background: none; font-size: 0.8rem; }
        .del-btn:hover { color: #FF5252; }

        footer { margin-top: 30px; font-size: 0.75rem; color: #BBB; text-align: center; padding-bottom: 20px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="main-card">
            <div class="header">
                <h1>🍱 배정 급식 포털</h1>
                <p>KIM HYEON JEOUNG PRINTS</p>
            </div>

            <div class="date-box">
                <input type="date" id="date-selector" onchange="updateUI()">
            </div>

            <div class="tab-switch">
                <div id="tab-lunch" class="tab-item active lunch" onclick="changeMealType('lunch')">☀️ 점심</div>
                <div id="tab-dinner" class="tab-item dinner" onclick="changeMealType('dinner')">🌙 저녁</div>
            </div>

            <div id="meal-card" class="meal-content-card lunch">
                <div class="meal-status-label" id="meal-status">오늘의 점심</div>
                <div class="menu-text" id="menu-content">식단을 불러오는 중...</div>
            </div>

            <div class="comments-section">
                <h3>💬 실시간 한줄평</h3>
                <div class="comment-input-row">
                    <input type="text" id="comment-input" placeholder="급식 어땠나요?">
                    <button onclick="saveComment()">등록</button>
                </div>
                <div id="comment-list" style="max-height: 250px; overflow-y: auto; padding-right: 5px;"></div>
            </div>
        </div>
        <footer>배정고 학생들의 밥심을 응원합니다 ❤️</footer>
    </div>

    <script>
        const ADMIN_PASSWORD = "배정고1234";
        const firebaseConfig = {
            apiKey: "AIzaSyBuUIzRhnj2lohiMZiXWmIosJDluEqp0-o",
            authDomain: "baejeong-lunch.firebaseapp.com",
            databaseURL: "https://baejeong-lunch-default-rtdb.firebaseio.com", 
            projectId: "baejeong-lunch",
            storageBucket: "baejeong-lunch.firebasestorage.app",
            messagingSenderId: "297041913628",
            appId: "1:297041913628:web:dca35b9917a5c2888ffcd9"

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const lunchData = {"2026-03-23": "한우불고기덮밥, 유부콩나물국, 건새우마늘쫑볶음, 양념 어묵 꼬치, 배추김치, 치즈 타르트", "2026-03-24": "칼슘밥, 자장 소스, 계란 후라이, 배추김치, 유기농 주스", "2026-03-25": "현미밥, 만두국, 치즈 닭구이, 감자전, 취나물 무침, 배추김치", "2026-03-26": "칼슘밥, 나주곰탕, 김치 오징어 전, 찰도그, 깍두기, 바나나", "2026-03-27": "혼합잡곡밥, 동태국, 콩나물 잡채, 동그랑땡 계란 부침, 햄 감자 조림, 배추김치", "2026-03-30": "마파두부 덮밥, 봄동 된장국, 탕수육, 돌나물, 새우 치즈 구이, 배추김치", "2026-03-31": "현미밥, 호박 수제비국, 고구마 함박 스테이크, 계란 장조림, 콥 샐러드", "2026-04-01": "백미밥, 북어채 콩나물국, 궁중 갈비찜, 브로콜리 두부 무침, 생크림 딸기 오믈렛", "2026-04-02": "혼합잡곡밥, 청국장찌개, 오징어 주꾸미 볶음, 순두부 계란찜, 미니 돈가스, 사과 치커리 초무침", "2026-04-06": "현미밥, 쇠고기 미역국, 대패 오리 불고기, 두부 구이, 김말이 튀김, 취나물 무침", "2026-04-07": "칼슘밥, 우거지 등뼈 감자탕, 계란말이, 고등어구이, 콩나물 무침, 배추김치", "2026-04-08": "곤드레밥, 두부 호박 된장국, 오향장육, 무쌈, 고구마 롤, 배추김치, 호두 정과", "2026-04-09": "흑미밥, 어묵국, 메추리알 쇠고기 볶음, 소시지 계란 부침, 마늘쫑 멸치 볶음", "2026-04-10": "칼슘밥, 계란찜, 탕평채, 배추김치, 파인애플", "2026-04-13": "국수, 백미밥/김가루, 떡갈비, 미나리 오징어 무침, 배추김치, 슈크림 붕어빵", "2026-04-14": "혼합잡곡밥, 단배추 된장국, 감자채 피망 볶음, 배추김치", "2026-04-15": "칼슘밥, 마라탕, 꿔바로우, 스크램블 에그, 배추김치, 맛김", "2026-04-16": "된장찌개, 오꼬노미 볶음 우동, 감자 조림, 온두부/김치 볶음, 토마토 꿀 절임", "2026-04-17": "카레, 불닭 볶음/또띠아, 양상추 샐러드, 맛김치, 비요뜨", "2026-04-20": "현미밥, 곤약 탕국, 간장 불고기, 참치 두부 조림, 우엉 잡채, 배추김치", "2026-04-21": "칼슘밥, 부대찌개, 계란 장조림, 열무 된장 무침, 가자미 버터구이, 깍두기", "2026-04-22": "현미밥, 두부 호박 된장국, 간장 찜닭, 동그랑땡 계란 부침, 건새우 마늘쫑 볶음", "2026-04-23": "혼합잡곡밥, 쇠고기 무국, 순살 족발/무쌈, 버섯 계란찜, 숙주 미나리 무침, 배추김치", "2026-04-24": "나물 비빔밥, 청국장찌개, 계란후라이, 배추김치, 애플파이", "2026-04-27": "컵밥, 북어채 무국, 초코 꽈배기", "2026-04-28": "우동, 비빔만두 강정, 배추김치", "2026-04-29": "감자튀김, 흑당 버블티", "2026-04-30": "채소 볶음밥, 유부 장국, 떡볶이, 깍두기, 유산균 음료"};
        const dinnerData = {"2026-03-23": "우동, 치즈 반달 돈가스, 브로콜리/초장, 깍두기, 딸기", "2026-03-25": "오징어 주꾸미 비빔밥, 단배추 된장국, 계란찜, 떡갈비 떡꼬치, 배추김치", "2026-03-26": "칼슘밥/김자반, 우대 갈비 구이, 국물 떡볶이, 양상추 샐러드, 아이스크림", "2026-03-27": "칼슘밥, 나가사끼 짬뽕국, 곤약 메추리알 조림, 배추김치", "2026-03-30": "혼합잡곡밥, 부대찌개, 삼치구이, 고추 튀김, 깍두기, 베이비슈", "2026-03-31": "지코바 치밥, 단배추 된장국, 크림 떡볶음, 명엽채 조림, 배추김치", "2026-04-01": "차수수밥, 떡국, 깐쇼새우 조림, 호박 베이컨 볶음, 참나물 전, 배추김치", "2026-04-02": "라면, 모듬 튀김, 순대/쌈장, 구슬 아이스크림", "2026-04-06": "김치말이 국수, 백미밥, 도끼 떡갈비, 시금치 나물, 갈릭 파이", "2026-04-07": "나시고랭 볶음밥, 시금치 된장국, 불고기 분짜, 춘권, 깍두기", "2026-04-08": "칼슘밥, 닭곰탕/당면 사리, 스팸구이, 쥐포채 조림, 깍두기, 요구르트", "2026-04-09": "통닭구이, 양배추 마요 케첩 무침, 무절임, 자몽 에이드", "2026-04-10": "현미밥, 들깨가루 무채국, 칼 비빔면, 함박 스테이크, 깍두기, 요거트/블루베리", "2026-04-13": "기장밥, 쇠고기 버섯 전골, 생선까스, 도토리묵, 배추김치", "2026-04-14": "추억의 도시락, 유부 장국, 연근 조림, 소떡소떡, 깍두기, 쿨피스", "2026-04-15": "혼합잡곡밥, 고추장찌개, 오리훈제, 콩나물 무침, 해물파전, 배추김치", "2026-04-16": "칼슘밥/ 맛김치, 삼겹살 구이, 물쫄면, 상추/쌈장, 후룻볼", "2026-04-17": "혼합잡곡밥, 육개장, 연어 스테이크, 계란말이, 김치 오징어 전, 바스크 초코 케익", "2026-04-20": "치킨마요 덮밥, 팽이버섯 된장국, 일미 도라지 무침, 배추김치, 회오리감자, 딸기 주스", "2026-04-21": "돈코츠 라면, 백미밥, 치킨 스테이크, 깍두기, 바나나우유", "2026-04-22": "고추장 불고기 덮밥, 유부 콩나물국, 감자 크로켓, 연두부/쪽파 양념장, 배추김치, 푸딩", "2026-04-23": "갈릭 크림 시카고 피자, 알리오 올리오 스파게티, 양상추 샐러드, 모듬 피클, 사과 주스", "2026-04-24": "율무밥, 들깨가루 시락국, 불막창 닭 어깨살 볶음, 생선까스, 오이 참나물 겉절이, 배추김치"};

        const specialDinnerDates = ["2026-03-26", "2026-04-02", "2026-04-16", "2026-04-23"];
        let currentType = 'lunch';
        const dateInput = document.getElementById('date-selector');
        dateInput.value = new Date().toISOString().split('T')[0];

        function updateUI() {
            const date = dateInput.value;
            const menu = currentType === 'lunch' ? lunchData[date] : dinnerData[date];
            const card = document.getElementById('meal-card');
            const status = document.getElementById('meal-status');
            
            card.className = `meal-content-card ${currentType}`;
            status.innerText = `${currentType === 'lunch' ? '오늘의 점심' : '오늘의 저녁'}`;

            if (currentType === 'dinner' && specialDinnerDates.includes(date)) {
                card.classList.add('special-meal');
                status.innerText = "✨ 밥심 충전 특식! ✨";
            }

            document.getElementById('menu-content').innerHTML = menu ? menu.split(', ').join('<br>') : "정보가 없습니다 😴";
            loadComments();
        }

        function saveComment() {
            const date = dateInput.value;
            const input = document.getElementById('comment-input');
            if (!input.value.trim()) return;
            database.ref(`meals/${date}/${currentType}`).push({
                text: input.value, timestamp: new Date().toLocaleString()
            });
            input.value = "";
        }

        function deleteComment(key) {
            if (prompt("관리자 비밀번호:") === ADMIN_PASSWORD) {
                database.ref(`meals/${dateInput.value}/${currentType}/${key}`).remove();
            } else { alert("비밀번호 오류!"); }
        }

        function loadComments() {
            const date = dateInput.value;
            const list = document.getElementById('comment-list');
            database.ref(`meals/${date}/${currentType}`).off();
            database.ref(`meals/${date}/${currentType}`).on('value', (snapshot) => {
                list.innerHTML = "";
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).reverse().forEach(key => {
                        const item = data[key];
                        const div = document.createElement('div');
                        div.className = 'comment-bubble';
                        div.innerHTML = `<div class="comment-text">${item.text}</div><span class="comment-info">${item.timestamp}</span><button class="del-btn" onclick="deleteComment('${key}')">x</button>`;
                        list.appendChild(div);
                    });
                } else { list.innerHTML = "<p style='text-align:center; color:#CCC; font-size:0.8rem;'>첫 한줄평을 남겨주세요! 😊</p>"; }
            });
        }

        function changeMealType(type) {
            currentType = type;
            document.getElementById('tab-lunch').classList.toggle('active', type === 'lunch');
            document.getElementById('tab-dinner').classList.toggle('active', type === 'dinner');
            updateUI();
        }
        updateUI();
    </script>
</body>
</html>
